<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Cristiana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <div class="header-actions">
            <button class="install-btn">⬇️ Instalar App</button>
        </div>

        <div class="cassette-box">
            <!-- Asegúrate que el nombre sea el mismo que tienes en GitHub -->
            <img src="assetsportada.png" alt="Cassette">
        </div>

        <h2>Comed y bebed</h2>
        <p class="status">● EN VIVO</p>

        <button class="pill-button google-btn">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20"> 
            Iniciar con Google
        </button>

        <button class="pill-button like-btn">
            ❤️ 0
        </button>

        <button class="pill-button pause-btn" id="play-btn">
            PAUSE
        </button>

    </div>
    <script src="app.js"></script>
</body>
</html>
