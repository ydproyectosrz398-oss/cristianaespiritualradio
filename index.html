<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Radio</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <!-- BOTON INSTALAR -->
  <button id="installBtn" style="display:none;">
    <span class="icon">↓</span>
    Instalar App
  </button>

  <!-- INTRO -->
  <div id="intro">
    <video id="introVideo" autoplay muted playsinline>
      <!-- Eliminamos 'assets/' y usamos el nombre sin espacios -->
      <source src="intro.mp4" type="video/mp4">
    </video>
  </div>

  <!-- PLAYER -->
  <div id="player" class="hidden">
    <!-- Eliminamos 'assets/' y usamos el nombre corregido -->
    <img src="cover.png" class="cover">

    <h1 id="songTitle">Cargando...</h1>
    
    <p class="status">● EN VIVO</p>

    <div class="userBox">
      <button id="loginBtn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg">
        Iniciar con Google
      </button>
      <div id="userInfo"></div>
    </div>

    <button id="likeBtn">❤️ 0</button>

    <button id="playBtn">PLAY</button>

    <audio id="audio">
      <source src="" type="audio/mpeg">
    </audio>
  </div>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="app.js"></script>

</body>
</html>
